name: Fortnightly topic merge

on:
  workflow_dispatch:
  schedule:
    - cron: "0 21 */14 * *"

permissions:
  contents: write

concurrency:
  group: fortnightly-merge-${{ github.ref }}
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::dplyr
            any::readr
            any::stringr
            any::purrr
            any::lubridate
            any::tidyr
            any::janitor
            any::tibble

      - name: Verify packages
        shell: Rscript {0}
        run: |
          pkgs <- c("dplyr","readr","stringr","purrr","lubridate","tidyr","janitor","tibble")
          ok <- vapply(pkgs, requireNamespace, quietly = TRUE, FUN.VALUE = logical(1))
          print(ok)
          if (!all(ok)) stop("Missing packages: ", paste(names(ok)[!ok], collapse = ", "))

      - name: Run fortnightly merge
        run: Rscript scripts/merge_topics_fortnightly.R

      - name: Show processed files
        run: |
          echo "Files under data/processed:"
          find data/processed -type f | sort

      - name: Commit and push merged outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/processed/ config/

          if git diff --cached --quiet; then
            echo "No processed data changes to commit"
          else
            git commit -m "Fortnightly topic merge update"
            git push origin HEAD:${{ github.ref_name }}
          fi